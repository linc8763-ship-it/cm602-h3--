<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f766e" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="CM602 H3" />
  <title>CM602 H3 吸頭補正工具</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header class="hero">
      <div class="badge">V1.0 · 第四階段</div>
      <h1>CM602 H3 吸頭補正工具</h1>
      <p>固定版面 OCR 強化版：修正 Pos 分類，改用三格青綠色分數判斷。</p>
    </header>

    <section class="card" id="uploadCard">
      <h2>1. 選取照片</h2>
      <p class="hint">請一次選取 Pos1、Pos2、Pos3、精度驗證數據共 4 張，順序不限。</p>
      <label class="uploadBox" for="photoInput">
        <span>點我選取或拍攝照片</span>
        <small>支援 JPG / PNG / HEIC 轉入</small>
      </label>
      <input id="photoInput" type="file" accept="image/*" multiple />
      <div id="countStatus" class="status muted">尚未選取照片</div>
      <div id="previewGrid" class="previewGrid"></div>
      <button id="startOcrBtn" class="primary" disabled>開始 OCR 辨識</button>
    </section>

    <section class="card hidden" id="ocrCard">
      <h2>2. OCR 辨識中</h2>
      <div class="progressWrap"><div id="progressBar" class="progressBar"></div></div>
      <p id="progressText" class="hint">準備中…</p>
      <p class="hint small">此版會先裁切表格區域，所以速度會比第二階段稍慢，但分類會更穩。</p>
    </section>

    <section class="card hidden" id="resultCard">
      <h2>3. 辨識結果確認</h2>
      <div id="integrityBox" class="integrityBox"></div>
      <p class="hint">下方數值可手動修改。此階段先確認 OCR 與分類，下一階段會接 Excel 自動寫入。</p>
      <div id="resultList" class="resultList"></div>
      <details class="debugBox">
        <summary>查看裁切區域 / OCR 原始文字</summary>
        <div id="debugList"></div>
      </details>
      <div class="actions">
        <button id="rerunBtn" class="secondary">重新選擇照片</button>
        <button id="downloadJsonBtn" class="primary">下載辨識結果 JSON</button>
      </div>
    </section>

    <footer>
      <span>CM602 H3 專用 · 固定版面裁切 OCR</span>
    </footer>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script src="app.js?v=4"></script>
</body>
</html>
